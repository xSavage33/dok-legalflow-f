# =============================================================================
# LEGALFLOW FRONTEND - DOCKER COMPOSE PRODUCCION (DOKPLOY)
# =============================================================================

services:
  admin-portal:
    build:
      context: ./admin-portal
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    restart: unless-stopped
    ports:
      - "4000:80"
    networks:
      - frontend_network

  client-portal:
    build:
      context: ./client-portal
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    restart: unless-stopped
    ports:
      - "4001:80"
    networks:
      - frontend_network

networks:
  frontend_network:
    driver: bridge
